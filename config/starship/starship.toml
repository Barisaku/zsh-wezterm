detect_extensions = ["py"]
detect_files = [
  ".python-version",
  "pyproject.toml",
  "requirements.txt",
  "setup.py",
  "tox.ini",
]
detect_folders = [".venv", "venv"]

[ruby]
format = "[ÓāĪ ÓěĎ $version ]($style)"
