[hostname]
ssh_only = true
format = "[ÓāĪ ůį£Ä $hostname ]($style)"
style = "fg:yellow bg:left_bg bold"
trim_at = "."

[directory]
format = "[Óā∂](fg:left_bg)[ ÔĀľ $path$read_only ]($style)"
style = "fg:left_fg bg:left_bg bold"
read_only = " ÔÄ£"
